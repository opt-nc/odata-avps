[site]
title = "Bourse de l'Emploi OPT"
description = "Espace de consultation des Avis de Vacances de Poste (AVP) pour les agents de l'OPT."
author = "M"

[build]
docs_dir = "data"
# Dossier final généré (celui que GitHub Pages publiera)
site_dir = "public" 

[theme]
name = "material" 
palette = { primary = "blue", accent = "blue" } 


[project]
# On déclare le fichier CSS
extra_css = ["style/extra.css"]
extra_javascript = ["style/extra.js"]

[project.theme]
# On déclare le logo principal (qui s'affichera en haut à gauche par défaut)
logo = "assets/logo-opt.png"
favicon = "assets/logo-opt.png"