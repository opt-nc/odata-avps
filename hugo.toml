baseURL = 'https://opt-nc.github.io/odata-avps/'
locale = 'fr-fr'
defaultContentLanguage = 'fr'
title = "Bourse de l'Emploi OPT-NC"
theme = 'hugo-theme-relearn'

[params]
  # Options du thème Relearn
  # themeVariant = 'blue' # Un beau thème bleu pro par défaut
  themeVariant = [ "opt-light", "opt-dark" ]
  landingPageName = "<i class='fa-fw fas fa-home'></i> Bienvenue"

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]


[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # ✅ Autorise le HTML brut (comme ton footer <center>) dans le Markdown
