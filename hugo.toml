baseURL = 'https://opt-nc.github.io/odata-avps/'
locale = 'fr-fr'
defaultContentLanguage = 'fr'
title = "Bourse de l'Emploi OPT-NC"
theme = 'hugo-theme-relearn'

[params]
  # Options du thème Relearn
  # themeVariant = 'blue' # Un beau thème bleu pro par défaut
  themeVariant = [ "opt-light", "opt-dark" ]
  landingPageName = "<i class='fa-fw fas fa-home'></i> Bienvenue"
  collapsibleMenu = true
  disableShortcutsTitle = true

[params.topbar]
    sidebar = "show"

[[menu.shortcuts]]
name = "<i class='fas fa-fw fa-info-circle'></i> À propos"
pageRef = "/a-propos"
weight = 10

[outputFormats.jobs_sitemap]
  mediaType = "application/xml"
  baseName = "jobs-sitemap"
  isHTML = false
  
[outputFormats.flux_ats]
  mediaType = "application/xml"
  baseName = "flux_ats"
  isHTML = false

[outputs]
  home = ['html', 'rss', 'print','markdown','jobs_sitemap','flux_ats']
  page = ['html', 'print','markdown']
  section = ['html', 'rss', 'print','markdown']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # ✅ Autorise le HTML brut (comme ton footer <center>) dans le Markdown


[params.social]
  facebook  = "https://www.facebook.com/OPT.NC"
  twitter   = "https://twitter.com/opt_nc"
  instagram = "https://www.instagram.com/opt_nc/"
  youtube   = "https://www.youtube.com/user/optnc"
  linkedin  = "https://www.linkedin.com/company/opt-new-caledonia"
  tiktok    = "https://www.tiktok.com/discover/team-opt-nc"