<meta name="hugo-build-time" content="{{ hugo.BuildDate.Format "2006-01-02 15:04:05" }}">
<meta name="hugo-version" content="{{ hugo.Version }}">
<meta name="git-revision" content="{{ if site.Data.git_commit }}{{ site.Data.git_commit.hash }}{{ else }}dev{{ end }}">
<link rel="icon" href="{{ "images/favicon.svg" | relURL }}" type="image/svg+xml">
<link rel="alternate icon" href="{{ "images/favicon.png" | relURL }}" type="image/png">
