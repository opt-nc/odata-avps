{{ if .Page.Params.featured_image }}
    {{ $imgPath := .Page.Params.featured_image }}
    {{ $imgPath = strings.TrimPrefix "/" $imgPath }}

    <div class="avp-dynamic-banner" style="margin: 2rem 0; width: 100%; display: flex; justify-content: center; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--CARD-BORDER-color, #e0e0e0); background-color: var(--CARD-BG-color, #ffffff);">
        {{/* 🎯 On supprime max-height et object-fit pour afficher l'image sans aucun crop */}}
        <img src="{{ $imgPath | relURL }}" 
             alt="Illustration du poste" 
             style="max-width: 100%; height: auto; display: block;">
    </div>
{{ end }}
