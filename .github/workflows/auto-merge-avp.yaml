name: 🤖 Auto-Merge AVP

on:
  pull_request:
    types: [opened]

jobs:
  automator:
    # On ne déclenche l'auto-merge que si la branche commence par notre préfixe AVP
    if: startsWith(github.head_ref, 'avp/')
    runs-on: ubuntu-latest
    
    # Permissions minimales requises pour modifier les PRs
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: 📥 Checkout du dépôt
        uses: actions/checkout@v4
        
      - name: 🚀 Fusion automatique de la PR et suppression de la branche
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

